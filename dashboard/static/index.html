<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dexmon</title>
  <script>
    (function() {
      if (localStorage.getItem('dexmon-theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="/chart.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --low: #dc2626;
      --high: #d97706;
      --normal: #16a34a;
      --low-line: rgba(220,38,38,0.45);
      --high-line: rgba(217,119,6,0.45);
      --grid: rgba(100,116,139,0.12);
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    }
    html.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 101;
    }
    header h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-right { display: flex; align-items: center; gap: 0.875rem; }
    #last-updated { font-size: 0.8rem; color: var(--text-muted); }
    #theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.25rem 0.625rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.4;
    }
    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.5rem; }
    /* ── Stat grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-current { grid-column: 1 / -1; }
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem 1.125rem;
      box-shadow: var(--shadow);
    }
    .stat-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 2.25rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-card:not(.stat-current) .stat-value { font-size: 1.75rem; }
    .stat-sub {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .trend { font-size: 1.2rem; }
    /* BG color classes */
    .bg-low    { color: var(--low); }
    .bg-high   { color: var(--high); }
    .bg-normal { color: var(--normal); }
    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.125rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .chart-wrap { position: relative; height: 220px; }
    /* ── Fullscreen chart ── */
    .card.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      margin: 0;
      border-radius: 0;
      padding: 1.5rem;
      overflow: hidden;
    }
    .card.fullscreen .chart-wrap { height: calc(100vh - 80px); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .card-header .card-title { margin-bottom: 0; }
    .window-pills { display: flex; gap: 0.25rem; }
    .pill {
      background: none;
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
    }
    .pill.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }
    /* ── Alarm table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      padding: 0.4rem 0.75rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-emergency { background: rgba(220,38,38,0.1);  color: var(--low); }
    .badge-high      { background: rgba(217,119,6,0.1);  color: var(--high); }
    .badge-normal    { background: rgba(22,163,74,0.1);  color: var(--normal); }
    .status-active { color: var(--low); font-weight: 600; }
    .text-muted { color: var(--text-muted); }
    .update-error { color: var(--high); }
  </style>
</head>
<body>
  <header>
    <h1>dexmon</h1>
    <div class="header-right">
      <span id="last-updated">Loading…</span>
      <button id="theme-btn" onclick="toggleTheme()">☀︎</button>
    </div>
  </header>
  <main>
    <div class="stats-grid">
      <div class="stat-card stat-current">
        <div class="stat-label">Current BG</div>
        <div class="stat-value" id="val-current">—</div>
        <div class="stat-sub">
          <span class="trend" id="val-trend"></span>
          <span id="val-current-age"></span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Previous</div>
        <div class="stat-value" id="val-prev">—</div>
        <div class="stat-sub" id="val-prev-age"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">High</div>
        <div class="stat-value" id="val-high">—</div>
        <div class="stat-sub" id="sub-high">24h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Low</div>
        <div class="stat-value" id="val-low">—</div>
        <div class="stat-sub" id="sub-low">24h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg</div>
        <div class="stat-value" id="val-avg">—</div>
        <div class="stat-sub" id="sub-avg">24h</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title" id="chart-title">BG — Last 24 Hours</div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <div class="window-pills">
            <button class="pill" data-window="12h" onclick="setWindow('12h')">12h</button>
            <button class="pill" data-window="24h" onclick="setWindow('24h')">24h</button>
            <button class="pill" data-window="7d"  onclick="setWindow('7d')">7d</button>
            <button class="pill" data-window="30d" onclick="setWindow('30d')">30d</button>
          </div>
          <button id="fullscreen-btn" onclick="toggleFullscreen()" style="background:none;border:1px solid var(--border);border-radius:0.375rem;padding:0.25rem 0.5rem;cursor:pointer;font-size:0.9rem;color:var(--text);line-height:1.4;" title="Toggle fullscreen">⤢</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="bg-chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Alarms</div>
      <table>
        <thead>
          <tr><th>Alarm</th><th>Priority</th><th>Last Fired</th><th>Status</th></tr>
        </thead>
        <tbody id="alarm-rows">
          <tr><td colspan="4" class="text-muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">Alarm History</div>
      <table>
        <thead>
          <tr><th>Alarm</th><th>BG</th><th>Time</th></tr>
        </thead>
        <tbody id="alarm-history-rows">
          <tr><td colspan="3" class="text-muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const REFRESH_MS = 5 * 60 * 1000;
    const TREND_ARROW = {
      double_up: '↑↑', single_up: '↑', forty_five_up: '↗',
      flat: '→',
      forty_five_down: '↘', single_down: '↓', double_down: '↓↓',
    };

    let chart = null;
    let lastData = null;
    let lastAsOf = null;
    let currentWindow = localStorage.getItem('dexmon-window') || '24h';

    // ── theme ──────────────────────────────────────────────────────────────
    function applyTheme() {
      const dark = document.documentElement.classList.contains('dark');
      document.getElementById('theme-btn').textContent = dark ? '☾' : '☀︎';
    }
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      const dark = document.documentElement.classList.contains('dark');
      localStorage.setItem('dexmon-theme', dark ? 'dark' : 'light');
      applyTheme();
      if (chart) { chart.destroy(); chart = null; }
      if (lastData) renderChart(lastData.readings || []);
    }
    applyTheme();

    // ── helpers ────────────────────────────────────────────────────────────
    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }
    function bgClass(v) {
      if (v < lastData.target.low)  return 'bg-low';
      if (v > lastData.target.high) return 'bg-high';
      return 'bg-normal';
    }
    function bgColor(v) {
      if (v < lastData.target.low)  return cssVar('--low');
      if (v > lastData.target.high) return cssVar('--high');
      return cssVar('--normal');
    }
    function timeAgo(iso) {
      if (!iso) return '';
      const s = Math.max(0, Math.floor((Date.now() - new Date(iso)) / 1000));
      if (s < 60)    return s + 's ago';
      if (s < 3600)  return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function chartTitle(w) {
      const map = {
        '12h': 'BG — Last 12 Hours',
        '24h': 'BG — Last 24 Hours',
        '7d':  'BG — Last 7 Days',
        '30d': 'BG — Last 30 Days',
      };
      return map[w] || 'BG — Last 24 Hours';
    }

    function updateWindowLabels(w) {
      ['high', 'low', 'avg'].forEach(id => {
        document.getElementById('sub-' + id).textContent = w;
      });
      document.getElementById('chart-title').textContent = chartTitle(w);
      document.querySelectorAll('.pill').forEach(b => {
        b.classList.toggle('active', b.dataset.window === w);
      });
    }

    function setWindow(w) {
      currentWindow = w;
      localStorage.setItem('dexmon-window', w);
      if (chart) { chart.destroy(); chart = null; }
      fetchAndRender();
    }

    // ── fullscreen ─────────────────────────────────────────────────────────
    let fullscreenCard = null;

    function toggleFullscreen() {
      if (!fullscreenCard) fullscreenCard = document.getElementById('fullscreen-btn').closest('.card');
      fullscreenCard.classList.toggle('fullscreen');
      const on = fullscreenCard.classList.contains('fullscreen');
      document.getElementById('fullscreen-btn').textContent = on ? '⤡' : '⤢';
      if (chart) chart.resize();
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && fullscreenCard && fullscreenCard.classList.contains('fullscreen')) {
        fullscreenCard.classList.remove('fullscreen');
        document.getElementById('fullscreen-btn').textContent = '⤢';
        if (chart) chart.resize();
      }
    });

    function chartLabel(isoStr, w) {
      const dt = new Date(isoStr);
      if (w === '12h' || w === '24h') {
        return dt.getMinutes() === 0
          ? dt.getHours().toString().padStart(2, '0') + ':00'
          : '';
      }
      if (w === '7d') {
        return (dt.getHours() === 0 && dt.getMinutes() === 0)
          ? dt.toLocaleDateString([], { weekday: 'short' })
          : '';
      }
      // 30d: label ~every 5 days at midnight to avoid mobile density overflow
      return (dt.getHours() === 0 && dt.getMinutes() === 0 && dt.getDate() % 5 === 1)
        ? dt.toLocaleDateString([], { month: 'short', day: 'numeric' })
        : '';
    }

    function isMinorTick(isoStr, w) {
      const dt = new Date(isoStr);
      if (w === '12h' || w === '24h') return dt.getMinutes() === 30;
      // 7d and 30d: noon mark (halfway through each day)
      return dt.getHours() === 12 && dt.getMinutes() === 0;
    }

    const rulerPlugin = {
      id: 'ruler',
      afterDraw(chart) {
        const xScale = chart.scales.x;
        const rds = chart._rulerReadings;
        const w   = chart._rulerWindow;
        if (!rds || !w) return;
        const ctx = chart.ctx;
        ctx.save();
        ctx.strokeStyle = cssVar('--text-muted');
        ctx.lineWidth = 1;
        rds.forEach((r, i) => {
          if (!isMinorTick(r.recorded_at, w)) return;
          const x = xScale.getPixelForValue(i);
          const y = xScale.top;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + 4);
          ctx.stroke();
        });
        ctx.restore();
      }
    };

    // ── render ─────────────────────────────────────────────────────────────
    function renderWidgets(d) {
      const cur = d.current, prev = d.previous;
      const curEl = document.getElementById('val-current');
      curEl.textContent = cur ? cur.value : '—';
      curEl.className = 'stat-value' + (cur ? ' ' + bgClass(cur.value) : '');
      document.getElementById('val-trend').textContent = cur ? (TREND_ARROW[cur.trend] || '') : '';
      document.getElementById('val-current-age').textContent = cur ? timeAgo(cur.recorded_at) : '';

      const prevEl = document.getElementById('val-prev');
      prevEl.textContent = prev ? prev.value : '—';
      prevEl.className = 'stat-value' + (prev ? ' ' + bgClass(prev.value) : '');
      document.getElementById('val-prev-age').textContent = prev ? timeAgo(prev.recorded_at) : '';

      document.getElementById('val-high').textContent = d.stats?.high || '—';
      document.getElementById('val-low').textContent  = d.stats?.low  || '—';
      document.getElementById('val-avg').textContent  = d.stats?.avg  || '—';
    }

    function renderChart(readings) {
      if (!readings.length) return;
      const labels = readings.map(r => chartLabel(r.recorded_at, currentWindow));
      const values    = readings.map(r => r.value);
      const ptColors  = readings.map(r => bgColor(r.value));
      const lowLine   = Array(readings.length).fill(lastData.target.low);
      const highLine  = Array(readings.length).fill(lastData.target.high);

      if (chart) {
        chart._rulerWindow   = currentWindow;
        chart._rulerReadings = readings;
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.data.datasets[0].pointBackgroundColor = ptColors;
        chart.data.datasets[1].data = lowLine;
        chart.data.datasets[2].data = highLine;
        chart.update('none');
        return;
      }

      const ctx = document.getElementById('bg-chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        plugins: [rulerPlugin],
        data: {
          labels,
          datasets: [
            {
              data: values,
              borderColor: '#6366f1',
              borderWidth: 2,
              pointBackgroundColor: ptColors,
              pointRadius: readings.length > 60 ? 2 : 3,
              tension: 0.3,
              fill: false,
            },
            {
              data: lowLine,
              borderColor: cssVar('--low-line'),
              borderWidth: 1,
              borderDash: [5, 4],
              pointRadius: 0,
              fill: '+1',
              backgroundColor: 'rgba(22,163,74,0.08)',
            },
            {
              data: highLine,
              borderColor: cssVar('--high-line'),
              borderWidth: 1,
              borderDash: [5, 4],
              pointRadius: 0,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              filter: item => item.datasetIndex === 0,
              callbacks: {
                title: ctx => {
                  const r = lastData.readings[ctx[0].dataIndex];
                  return new Date(r.recorded_at).toLocaleString([], {
                    month: 'short', day: 'numeric',
                    hour: '2-digit', minute: '2-digit',
                  });
                },
                label: ctx => 'BG: ' + ctx.parsed.y,
              },
            },
          },
          scales: {
            x: {
              grid: { color: cssVar('--grid') },
              ticks: {
                color: cssVar('--text-muted'),
                autoSkip: false,
                maxRotation: 0,
                callback: function(val) {
                  return this.getLabelForValue(val) || null;
                },
              },
            },
            y: {
              suggestedMin: 40,
              grid: { color: cssVar('--grid') },
              ticks: { color: cssVar('--text-muted') },
            },
          },
        },
      });
      chart._rulerWindow   = currentWindow;
      chart._rulerReadings = readings;
    }

    function renderAlarms(alarms) {
      const tbody = document.getElementById('alarm-rows');
      if (!alarms || !alarms.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-muted">No alarms configured.</td></tr>';
        return;
      }
      tbody.innerHTML = alarms.map(a => {
        const badge = `<span class="badge badge-${esc(a.priority)}">${esc(a.priority)}</span>`;
        const lastFiredCell = a.last_fired_at ? timeAgo(a.last_fired_at) : '<span class="text-muted">—</span>';
        let statusCell;
        switch (a.status) {
          case 'never_fired':
            statusCell = '<span class="text-muted">—</span>'; break;
          case 'active':
            statusCell = '<span class="status-active">Active</span>'; break;
          case 'snoozed_until':
            statusCell = 'Snoozed until ' + esc(fmtTime(a.snoozed_until)); break;
          default: // 'fired'
            statusCell = a.last_fired_at ? timeAgo(a.last_fired_at) : '<span class="text-muted">—</span>';
        }
        return `<tr>
          <td>${esc(a.name)}</td>
          <td>${badge}</td>
          <td>${lastFiredCell}</td>
          <td>${statusCell}</td>
        </tr>`;
      }).join('');
    }

    function renderAlarmHistory(history) {
      const tbody = document.getElementById('alarm-history-rows');
      if (!history || !history.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-muted">No alarms fired in this window.</td></tr>';
        return;
      }
      tbody.innerHTML = history.map(e => {
        const t = new Date(e.fired_at).toLocaleString([], {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
        return `<tr>
          <td>${esc(e.alarm_name)}</td>
          <td>${esc(e.bg_value)}</td>
          <td>${t}</td>
        </tr>`;
      }).join('');
    }

    function updateLastUpdated() {
      if (!lastAsOf) return;
      document.getElementById('last-updated').textContent = 'Last updated: ' + timeAgo(lastAsOf);
    }

    // ── fetch / refresh ────────────────────────────────────────────────────
    async function fetchAndRender() {
      try {
        const resp = await fetch('/api/dashboard?window=' + currentWindow);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const d = await resp.json();
        lastData = d;
        lastAsOf = d.as_of;
        renderWidgets(d);
        renderChart(d.readings || []);
        renderAlarms(d.alarms || []);
        renderAlarmHistory(d.alarm_history || []);
        updateLastUpdated();
        updateWindowLabels(d.window || '24h');
        const el = document.getElementById('last-updated');
        el.className = '';
      } catch (e) {
        const el = document.getElementById('last-updated');
        el.textContent = 'Update failed';
        el.className = 'update-error';
      }
    }

    updateWindowLabels(currentWindow);
    fetchAndRender();
    setInterval(fetchAndRender, REFRESH_MS);
    setInterval(updateLastUpdated, 60 * 1000);
  </script>
</body>
</html>
